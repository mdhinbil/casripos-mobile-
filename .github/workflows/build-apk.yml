name: Build Casri POS APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            ccache patch

      - name: Install Buildozer + Cython + Pillow
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0 cython==0.29.36 pillow

      # Regenerate icon.png / presplash.png so the build never depends on the
      # committed binaries being present or up to date.
      - name: Generate launcher assets
        run: python generate_assets.py

      - name: Cache Buildozer global (~/.buildozer)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v1-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v1-

      - name: Cache Buildozer local (.buildozer)
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-v1-${{ hashFiles('buildozer.spec', 'main.py') }}
          restore-keys: |
            buildozer-local-v1-

      - name: Pre-install Android SDK + build-tools 35.0.0 + accept licenses
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          if [ ! -f $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ]; then
            cd /tmp
            curl -sSLo cmdtools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q cmdtools.zip
            mkdir -p $ANDROID_HOME/cmdline-tools/latest
            mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          fi
          # Buildozer 1.5.0 looks for sdkmanager at the LEGACY path tools/bin.
          mkdir -p $ANDROID_HOME/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager $ANDROID_HOME/tools/bin/avdmanager
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          ls -la $ANDROID_HOME/build-tools/35.0.0/aidl
          $ANDROID_HOME/tools/bin/sdkmanager --version

      # The signing key is the Play Store UPLOAD KEY. It is kept ONLY in GitHub
      # secrets (never in the repo). Set these once via the gh CLI:
      #   gh secret set KEYSTORE_BASE64   < casri-upload.keystore.b64
      #   gh secret set KEYSTORE_PASSWORD --body '<password>'
      #   gh secret set KEY_ALIAS         --body 'casri'
      #   gh secret set KEY_PASSWORD      --body '<password>'
      - name: Decode upload keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is missing. Set the signing secrets (see workflow comment)."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > $HOME/casri-upload.keystore
          ls -la $HOME/casri-upload.keystore

      # ── Debug APK (installable for YOUR testing before uploading to Play) ──
      - name: Build APK (debug)
        run: buildozer -v android debug

      # Buildozer's debug APK is only v1-signed. Android 11+ refuses v1-only
      # APKs → "App not installed". Re-sign with apksigner v1+v2+v3.
      - name: Re-sign debug APK (v1+v2+v3 for Android 11+)
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          APK=$(ls bin/*-debug.apk | head -1)
          APKSIGNER=$HOME/.buildozer/android/platform/android-sdk/build-tools/35.0.0/apksigner
          $APKSIGNER sign \
            --ks $HOME/casri-upload.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KEY_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$APK"
          $APKSIGNER verify --verbose "$APK"
          cp "$APK" "bin/CasriPOS-debug.apk"

      # ── Release AAB (this is what you upload to the Play Console) ──
      - name: Build signed AAB (release)
        env:
          P4A_RELEASE_KEYSTORE: /home/runner/casri-upload.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_PASSWORD }}
        run: buildozer -v android release

      - name: Show built artifacts
        if: always()
        run: ls -lh bin/ || true

      - name: Upload artifacts (APK + AAB)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: casripos-build
          path: |
            bin/CasriPOS-debug.apk
            bin/*.aab
          if-no-files-found: warn
          retention-days: 30

      # GitHub Releases use storage separate from Actions artifacts.
      - name: Publish to GitHub Releases (APK for testing + AAB for Play)
        if: success() || failure()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Casri POS build ${{ github.run_number }}
          body: |
            Casri POS build from commit ${{ github.sha }}.
            • CasriPOS-debug.apk — install on a phone to test (enable "Install unknown apps").
            • *.aab — upload this to the Google Play Console.
          files: |
            bin/CasriPOS-debug.apk
            bin/*.aab
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
